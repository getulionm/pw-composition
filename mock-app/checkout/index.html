<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Checkout</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>
    <header class="shell-header" role="banner" data-pom="components/shell/header">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">MOCK STORE</span>
      </div>
      <div class="shell-membership">
        <label for="membership-select" class="sr-only">Membership</label>
        <select id="membership-select" aria-label="Membership">
          <option value="MEMBER" selected>MEMBER</option>
          <option value="GUEST">GUEST</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <a class="shell-cart-link" href="/cart/" aria-label="Cart">
        Cart <span id="cart-badge" class="cart-badge" aria-label="items in cart" data-cart-count="0">0</span>
      </a>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Member menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Sam Patel</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <div class="nav-drawer" data-pom="components/shell/navDrawer">
        <nav id="side-nav" class="side-nav" aria-label="Main">
          <p><a href="/">Home</a></p>
          <p><a href="/catalog/">Catalog</a></p>
          <p><a href="/cart/">Cart</a></p>
        </nav>
        <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
          <span class="drawer-chev" aria-hidden="true">&lt;</span>
          <span class="rail-label">Collapse menu</span>
        </button>
      </div>
      <div class="main-wrap">
        <main data-pom="pages/store.checkout">
          <h1>Checkout</h1>
          <form id="checkout-form" novalidate>
            <h2>Shipping</h2>
            <p>
              <label>Full name <input id="checkout-name" name="name" type="text" autocomplete="name" required /></label>
            </p>
            <p>
              <label>Address <input id="checkout-address" name="address" type="text" autocomplete="street-address" required /></label>
            </p>
            <h2>Payment</h2>
            <p>
              <label>Card number <input id="checkout-card" name="card" type="text" inputmode="numeric" autocomplete="cc-number" required /></label>
            </p>
            <p class="membership-lock-row">
              <label>
                <input id="save-card" type="checkbox" data-membership-lock />
                Save card for later
              </label>
              <span class="membership-lock-icon" hidden aria-hidden="true" title="MEMBER membership only">&#128274;</span>
            </p>
            <p>
              <button id="place-order-btn" type="button">Place order</button>
            </p>
            <p id="checkout-error" class="checkout-error" hidden role="alert">Please complete shipping and payment fields.</p>
          </form>
        </main>
      </div>
    </div>
    <div id="toast-root" class="toast-root" aria-live="polite" data-pom="components/shell/toast"></div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      (function () {
        const nameInput = document.getElementById("checkout-name");
        const addressInput = document.getElementById("checkout-address");
        const cardInput = document.getElementById("checkout-card");
        const placeBtn = document.getElementById("place-order-btn");
        const errorMsg = document.getElementById("checkout-error");
        if (!placeBtn) return;

        function ensureCartHasItems() {
          return window.mockStore.cart.read().length > 0;
        }

        placeBtn.addEventListener("click", () => {
          const ok =
            nameInput.value.trim() &&
            addressInput.value.trim() &&
            cardInput.value.trim() &&
            ensureCartHasItems();
          if (!ok) {
            errorMsg.hidden = false;
            return;
          }
          errorMsg.hidden = true;
          const orderId = "ORD-" + Math.floor(1000 + Math.random() * 9000);
          try {
            sessionStorage.setItem("mock-store-last-order", orderId);
          } catch {
            /* ignore */
          }
          window.mockStore.cart.clear();
          window.mockStore.toast("Order placed");
          window.location.assign(`/checkout/order-confirmation/?order=${encodeURIComponent(orderId)}`);
        });
      })();
    </script>
  </body>
</html>
