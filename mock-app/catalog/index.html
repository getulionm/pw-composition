<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Catalog</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>
    <header class="shell-header" role="banner" data-pom="components/shell/header">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">MOCK STORE</span>
      </div>
      <div class="shell-membership">
        <label for="membership-select" class="sr-only">Membership</label>
        <select id="membership-select" aria-label="Membership">
          <option value="MEMBER" selected>MEMBER</option>
          <option value="GUEST">GUEST</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <a class="shell-cart-link" href="/cart/" aria-label="Cart">
        Cart <span id="cart-badge" class="cart-badge" aria-label="items in cart" data-cart-count="0">0</span>
      </a>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Member menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Sam Patel</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <div class="nav-drawer" data-pom="components/shell/navDrawer">
        <nav id="side-nav" class="side-nav" aria-label="Main">
          <p><a href="/">Home</a></p>
          <p><a href="/catalog/">Catalog</a></p>
          <p><a href="/cart/">Cart</a></p>
        </nav>
        <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
          <span class="drawer-chev" aria-hidden="true">&lt;</span>
          <span class="rail-label">Collapse menu</span>
        </button>
      </div>
      <div class="main-wrap">
        <main
          data-pom="pages/store.catalog"
          data-pom-composition="components/widgets/searchBox,components/widgets/table"
        >
          <h1>Catalog</h1>
          <p data-pom="components/widgets/searchBox">
            <input id="product-search" type="search" placeholder="Search..." />
            <button id="product-search-btn" type="button">Search</button>
            <button id="product-search-clear" type="button">Clear</button>
          </p>
          <table data-pom="components/widgets/table" aria-label="Products">
            <thead>
              <tr>
                <th scope="col">NAME</th>
                <th scope="col">PRICE</th>
                <th scope="col">ACTION</th>
              </tr>
            </thead>
            <tbody id="products-table-body">
              <tr data-product-slug="acme-widget">
                <td>Acme Widget</td>
                <td class="catalog-price-cell" data-product-slug="acme-widget" data-testid="table-cell-price">£10</td>
                <td><a href="/catalog/products/acme-widget/">View</a></td>
              </tr>
              <tr data-product-slug="super-gizmo">
                <td>Super Gizmo</td>
                <td class="catalog-price-cell" data-product-slug="super-gizmo" data-testid="table-cell-price">£6</td>
                <td><a href="/catalog/products/super-gizmo/">View</a></td>
              </tr>
            </tbody>
          </table>
        </main>
      </div>
    </div>
    <div id="toast-root" class="toast-root" aria-live="polite" data-pom="components/shell/toast"></div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      (function () {
        const tbody = document.getElementById("products-table-body");
        const input = document.getElementById("product-search");
        const searchBtn = document.getElementById("product-search-btn");
        const clearBtn = document.getElementById("product-search-clear");
        if (!tbody || !input || !searchBtn || !clearBtn) return;

        const defaultHtml = tbody.innerHTML;

        function rowName(tr) {
          const first = tr.querySelector("td");
          return (first?.textContent || "").trim();
        }

        function afterTableUpdate() {
          if (window.mockStore && typeof window.mockStore.syncProductPricing === "function") {
            window.mockStore.syncProductPricing();
          }
        }

        function applySearch() {
          const q = input.value.trim().toLowerCase();
          const tmp = document.createElement("tbody");
          tmp.innerHTML = defaultHtml;
          const rows = Array.from(tmp.querySelectorAll("tr"));
          tbody.innerHTML = "";
          (q ? rows.filter((tr) => rowName(tr).toLowerCase().includes(q)) : rows).forEach((tr) =>
            tbody.appendChild(tr.cloneNode(true))
          );
          afterTableUpdate();
        }

        function restoreDefault() {
          tbody.innerHTML = defaultHtml;
          input.value = "";
          afterTableUpdate();
        }

        searchBtn.addEventListener("click", applySearch);
        clearBtn.addEventListener("click", restoreDefault);
        input.addEventListener("keydown", (e) => {
          if (e.key === "Enter") applySearch();
        });
      })();
    </script>
  </body>
</html>
