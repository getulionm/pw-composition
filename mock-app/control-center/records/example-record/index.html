<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Record</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>
    <header class="shell-header" role="banner" data-pom="components/shell/masthead">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">MOCK SHELL</span>
      </div>
      <div class="shell-workspace">
        <label for="workspace-select" class="sr-only">Workspace</label>
        <select id="workspace-select" aria-label="Workspace">
          <option value="ADMIN" selected>ADMIN</option>
          <option value="USER">USER</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Admin menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Alex Morgan</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <nav id="side-nav" class="side-nav" aria-label="Main" data-pom="components/shell/navigationDrawer">
        <p><a href="/control-center/">Home</a></p>
        <p><a href="/control-center/records/">Records</a></p>
        <p>
          <button type="button" id="tools-btn" aria-expanded="false" aria-controls="tools-panel" aria-label="Tools menu">
            Tools <span class="tools-chev" aria-hidden="true">▾</span>
          </button>
        </p>
        <div id="tools-panel" hidden>
          <p><a href="/control-center/view-tools/">View tools</a></p>
          <p class="tools-nav-row tools-nav-row--create">
            <a href="/control-center/create-tool/" data-nav="create-tool">Create tool</a>
            <span class="create-tool-lock-icon" hidden aria-hidden="true" title="ADMIN workspace only">🔒</span>
          </p>
        </div>
      </nav>
      <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
        <span class="drawer-chev" aria-hidden="true">&lt;</span>
        <span class="rail-label">Collapse menu</span>
      </button>
      <div class="main-wrap">
        <main data-pom="pages/controlCenter.recordDetails">
          <h1 id="record-detail-title">Example Record 1</h1>
          <p>Status: <span>Ready</span></p>
        </main>
      </div>
    </div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      (function () {
        const h1 = document.getElementById("record-detail-title");
        if (!h1) return;
        const sp = new URLSearchParams(window.location.search);
        const byName = sp.get("name");
        if (byName) {
          h1.textContent = decodeURIComponent(byName);
          return;
        }
        const n = sp.get("n") || "1";
        h1.textContent = "Example Record " + n;
      })();
    </script>
  </body>
</html>
