<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Records</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>
    <header class="shell-header" role="banner" data-pom="components/shell/masthead">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">CONTROL CENTER</span>
      </div>
      <div class="shell-workspace">
        <label for="workspace-select" class="sr-only">Workspace</label>
        <select id="workspace-select" aria-label="Workspace">
          <option value="ADMIN" selected>ADMIN</option>
          <option value="USER">USER</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Admin menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Alex Morgan</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <nav id="side-nav" class="side-nav" aria-label="Main" data-pom="components/shell/navigationDrawer">
        <p><a href="/control-center/">Home</a></p>
        <p><a href="/control-center/records/">Records</a></p>
        <p>
          <button type="button" id="tools-btn" aria-expanded="false" aria-controls="tools-panel" aria-label="Tools menu">
            Tools <span class="tools-chev" aria-hidden="true">▾</span>
          </button>
        </p>
        <div id="tools-panel" hidden>
          <p><a href="/control-center/view-tools/">View tools</a></p>
          <p class="tools-nav-row tools-nav-row--create">
            <a href="/control-center/create-tool/" data-nav="create-tool">Create tool</a>
            <span class="create-tool-lock-icon" hidden aria-hidden="true" title="ADMIN workspace only">🔒</span>
          </p>
        </div>
      </nav>
      <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
        <span class="drawer-chev" aria-hidden="true">&lt;</span>
        <span class="rail-label">Collapse menu</span>
      </button>
      <div class="main-wrap">
        <main
          data-pom="pages/controlCenter.records"
          data-pom-composition="components/widgets/searchBox,components/widgets/table"
        >
          <h1>Records</h1>
          <p data-pom="components/widgets/searchBox">
            <input id="record-search" type="search" placeholder="Search..." />
            <button id="record-search-btn" type="button">Search</button>
            <button id="record-search-clear" type="button">Clear</button>
          </p>
          <p><button type="button" id="create-record-btn">Create Record</button></p>
          <table data-pom="components/widgets/table">
            <thead>
              <tr>
                <th scope="col">COLUMN A</th>
                <th scope="col">COLUMN B</th>
                <th scope="col">STATUS</th>
                <th scope="col">ACTION</th>
              </tr>
            </thead>
            <tbody id="records-table-body">
              <tr data-record-label="Example Record 1">
                <td>Example Record 1</td>
                <td>—</td>
                <td data-testid="table-cell-status">Ready</td>
                <td><a href="/control-center/records/example-record/?n=1">View</a></td>
              </tr>
              <tr data-record-label="Example Record 2">
                <td>Example Record 2</td>
                <td>—</td>
                <td data-testid="table-cell-status">Ready</td>
                <td><a href="/control-center/records/example-record/?n=2">View</a></td>
              </tr>
            </tbody>
          </table>
        </main>
      </div>
    </div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      (function () {
        const tbody = document.getElementById("records-table-body");
        const input = document.getElementById("record-search");
        const searchBtn = document.getElementById("record-search-btn");
        const clearBtn = document.getElementById("record-search-clear");
        const createBtn = document.getElementById("create-record-btn");
        if (!tbody || !input || !searchBtn || !clearBtn) return;

        let defaultHtml = tbody.innerHTML;
        let nextNewId = 100;

        function rowLabel(tr) {
          return (tr.getAttribute("data-record-label") || tr.textContent || "").trim();
        }

        function rowsFromDefaultHtml() {
          const tmp = document.createElement("tbody");
          tmp.innerHTML = defaultHtml;
          return Array.from(tmp.querySelectorAll("tr"));
        }

        function applySearch() {
          const q = input.value.trim().toLowerCase();
          const all = rowsFromDefaultHtml();
          tbody.innerHTML = "";
          if (!q) {
            all.forEach((tr) => tbody.appendChild(tr.cloneNode(true)));
            return;
          }
          all
            .filter((tr) => rowLabel(tr).toLowerCase().includes(q))
            .forEach((tr) => tbody.appendChild(tr.cloneNode(true)));
        }

        function restoreDefault() {
          tbody.innerHTML = defaultHtml;
          input.value = "";
        }

        searchBtn.addEventListener("click", applySearch);
        clearBtn.addEventListener("click", restoreDefault);

        if (createBtn) {
          createBtn.addEventListener("click", () => {
            const name = "New record " + nextNewId++;
            const tr = document.createElement("tr");
            tr.setAttribute("data-record-label", name);
            tr.innerHTML =
              "<td>" +
              name +
              '</td><td>—</td><td data-testid="table-cell-status">Ready</td><td><a href="/control-center/records/example-record/?name=' +
              encodeURIComponent(name) +
              '">View</a></td>';
            tbody.appendChild(tr);
            const snapshot = tbody.innerHTML;
            defaultHtml = snapshot;
          });
        }
      })();
    </script>
  </body>
</html>
