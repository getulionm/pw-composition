<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>
    <header class="shell-header" role="banner" data-pom="MastheadComponent">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">MOCK SHELL</span>
      </div>
      <div class="shell-workspace">
        <label for="workspace-select" class="sr-only">Workspace</label>
        <select id="workspace-select" aria-label="Workspace">
          <option value="ADMIN" selected>ADMIN</option>
          <option value="USER">USER</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Admin menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Alex Morgan</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <nav id="side-nav" class="side-nav" aria-label="Main" data-pom="NavigationDrawerComponent">
        <p><a href="/control-center/">Home</a></p>
        <p><a href="/control-center/records/">Records</a></p>
        <p>
          <button type="button" id="tools-btn" aria-expanded="false" aria-controls="tools-panel" aria-label="Tools menu">
            Tools <span class="tools-chev" aria-hidden="true">▾</span>
          </button>
        </p>
        <div id="tools-panel" hidden>
          <p><a href="/control-center/view-tools/">View tools</a></p>
          <p class="tools-nav-row tools-nav-row--create">
            <a href="/control-center/create-tool/" data-nav="create-tool">Create tool</a>
            <span class="create-tool-lock-icon" hidden aria-hidden="true" title="ADMIN workspace only">🔒</span>
          </p>
        </div>
      </nav>
      <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
        <span class="drawer-chev" aria-hidden="true">&lt;</span>
        <span class="rail-label">Collapse menu</span>
      </button>
      <div class="main-wrap">
        <main data-pom="HomePage">
          <h1>Welcome <span id="welcome-workspace">ADMIN</span></h1>
          <p>Teaching mock — no backend. Workspace in the masthead drives ADMIN vs USER for this shell.</p>
          <p>
            <button
              type="button"
              id="welcome-modal-open"
              aria-haspopup="dialog"
              aria-controls="welcome-modal-root"
            >
              Open welcome modal
            </button>
          </p>
        </main>
      </div>
    </div>
    <div id="welcome-modal-root" class="modal-backdrop" hidden>
      <div role="dialog" aria-modal="true" aria-label="Welcome modal" data-pom="ModalComponent">
        <h2 id="welcome-modal-title">Welcome ADMIN</h2>
        <p><button type="button" id="welcome-modal-close">Close</button></p>
      </div>
    </div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      const openBtn = document.getElementById("welcome-modal-open");
      const root = document.getElementById("welcome-modal-root");
      const closeBtn = document.getElementById("welcome-modal-close");
      const titleEl = document.getElementById("welcome-modal-title");
      if (openBtn && root && closeBtn && titleEl) {
        openBtn.addEventListener("click", () => {
          const ws = document.body.getAttribute("data-workspace") || "ADMIN";
          if (titleEl) titleEl.textContent = `Welcome ${ws}`;
          root.hidden = false;
        });
        closeBtn.addEventListener("click", () => {
          root.hidden = true;
        });
        root.addEventListener("click", (e) => {
          if (e.target === root) root.hidden = true;
        });
      }
    </script>
  </body>
</html>
