<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Create tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>
    <header class="shell-header" role="banner" data-pom="components/shell/masthead">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">MOCK SHELL</span>
      </div>
      <div class="shell-workspace">
        <label for="workspace-select" class="sr-only">Workspace</label>
        <select id="workspace-select" aria-label="Workspace">
          <option value="ADMIN" selected>ADMIN</option>
          <option value="USER">USER</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Admin menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Alex Morgan</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <nav id="side-nav" class="side-nav" aria-label="Main" data-pom="components/shell/navigationDrawer">
        <p><a href="/control-center/">Home</a></p>
        <p><a href="/control-center/records/">Records</a></p>
        <p>
          <button type="button" id="tools-btn" aria-expanded="true" aria-controls="tools-panel" aria-label="Tools menu">
            Tools <span class="tools-chev" aria-hidden="true">▴</span>
          </button>
        </p>
        <div id="tools-panel">
          <p><a href="/control-center/view-tools/">View tools</a></p>
          <p class="tools-nav-row tools-nav-row--create">
            <a href="/control-center/create-tool/" aria-current="page" data-nav="create-tool">Create tool</a>
            <span class="create-tool-lock-icon" hidden aria-hidden="true" title="ADMIN workspace only">🔒</span>
          </p>
        </div>
      </nav>
      <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
        <span class="drawer-chev" aria-hidden="true">&lt;</span>
        <span class="rail-label">Collapse menu</span>
      </button>
      <div class="main-wrap">
        <main data-pom="pages/controlCenter.createTool">
          <h1>Create tool</h1>
          <div id="create-tool-user-message" hidden>
            <p>USER workspace — <strong>Create tool</strong> is not available. Switch to ADMIN in the masthead to create tools.</p>
          </div>
          <div id="create-tool-admin-panel">
            <p>ADMIN workspace — create items here; the list lives on <strong>View tools</strong>.</p>
            <p><button type="button" id="create-item-btn">Create Item</button></p>
            <p id="create-item-feedback" class="create-item-feedback" hidden>
              Item created, view it in the View tools page.
            </p>
          </div>
        </main>
      </div>
    </div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      const STORAGE_KEY = "pw-mock-built-tools";
      function readRows() {
        try {
          return JSON.parse(sessionStorage.getItem(STORAGE_KEY) || "[]");
        } catch {
          return [];
        }
      }
      const feedback = document.getElementById("create-item-feedback");
      const createBtn = document.getElementById("create-item-btn");
      const userMsg = document.getElementById("create-tool-user-message");
      const adminPanel = document.getElementById("create-tool-admin-panel");

      function applyCreateToolWorkspace() {
        const ws = document.body.getAttribute("data-workspace") || "ADMIN";
        if (userMsg && adminPanel) {
          userMsg.hidden = ws !== "USER";
          adminPanel.hidden = ws === "USER";
        }
      }
      applyCreateToolWorkspace();
      const wsSelect = document.getElementById("workspace-select");
      if (wsSelect) wsSelect.addEventListener("change", applyCreateToolWorkspace);

      if (createBtn) {
        createBtn.addEventListener("click", () => {
          const rows = readRows();
          const n = rows.length + 1;
          rows.push({ name: "New item #" + n, status: "Ready" });
          sessionStorage.setItem(STORAGE_KEY, JSON.stringify(rows));
          if (feedback) feedback.hidden = false;
        });
      }
    </script>
  </body>
</html>
