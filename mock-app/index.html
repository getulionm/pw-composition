<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/shared/mock-shell.css" />
  </head>
  <body>

    <header class="shell-header" role="banner" data-pom="components/shell/header">
      <div class="shell-brand">
        <img src="/shared/mock-logo.svg" width="32" height="32" alt="" />
        <span class="shell-title">MOCK STORE</span>
      </div>
      <div class="shell-membership">
        <label for="membership-select" class="sr-only">Membership</label>
        <select id="membership-select" aria-label="Membership">
          <option value="MEMBER" selected>MEMBER</option>
          <option value="GUEST">GUEST</option>
        </select>
      </div>
      <div class="shell-header-spacer"></div>
      <a class="shell-cart-link" href="/cart/" aria-label="Cart">
        Cart <span id="cart-badge" class="cart-badge" aria-label="items in cart" data-cart-count="0">0</span>
      </a>
      <div class="shell-user-wrap">
        <button type="button" id="user-menu-btn" aria-expanded="false" aria-haspopup="true">Member menu</button>
        <div id="user-dropdown" class="user-dropdown" hidden role="menu">
          <div class="user-name" role="menuitem">Sam Patel</div>
        </div>
      </div>
    </header>
    <div class="layout" id="app-layout">
      <div class="nav-drawer" data-pom="components/shell/navDrawer">
        <nav id="side-nav" class="side-nav" aria-label="Main">
          <p><a href="/">Home</a></p>
          <p><a href="/catalog/">Catalog</a></p>
          <p><a href="/cart/">Cart</a></p>
        </nav>
        <button type="button" id="collapse-menu-btn" class="nav-rail-toggle" aria-expanded="true" aria-label="Collapse menu">
          <span class="drawer-chev" aria-hidden="true">&lt;</span>
          <span class="rail-label">Collapse menu</span>
        </button>
      </div>
      <div class="main-wrap">
        <main
          data-pom="pages/store.home"
          data-pom-composition="components/widgets/featuredOffers,components/widgets/productCard,components/widgets/modal"
        >
          <h1>Welcome <span data-membership-greeting>MEMBER</span></h1>
          <p class="home-welcome-actions">
            <button
              type="button"
              id="welcome-modal-open"
              aria-haspopup="dialog"
              aria-controls="welcome-modal-root"
            >
              Open welcome modal
            </button>
          </p>
          <p>Static mock store for Playwright framework examples.</p>
          <section
            class="featured-offers-section"
            data-pom="components/widgets/featuredOffers"
            aria-labelledby="featured-offers-heading"
          >
            <h2 id="featured-offers-heading">Product offers: Members only</h2>
            <ul class="featured-offers__list" aria-label="Product offers list">
              <li class="featured-offers__item">
                <a
                  class="featured-card"
                  data-pom="components/widgets/productCard"
                  data-product-slug="acme-widget"
                  href="/catalog/products/acme-widget/"
                >
                  <div class="featured-card__head">
                    <span class="featured-card__title">Acme Widget</span>
                    <span class="featured-card__price" data-testid="featured-card-price">£10</span>
                  </div>
                  <span class="featured-card__image" aria-hidden="true"></span>
                </a>
              </li>
              <li class="featured-offers__item">
                <a
                  class="featured-card"
                  data-pom="components/widgets/productCard"
                  data-product-slug="super-gizmo"
                  href="/catalog/products/super-gizmo/"
                >
                  <div class="featured-card__head">
                    <span class="featured-card__title">Super Gizmo</span>
                    <span class="featured-card__price" data-testid="featured-card-price">£6</span>
                  </div>
                  <span class="featured-card__image" aria-hidden="true"></span>
                </a>
              </li>
            </ul>
          </section>
        </main>
      </div>
    </div>
    <div id="welcome-modal-root" class="modal-backdrop" hidden>
      <div role="dialog" aria-modal="true" aria-label="Welcome modal" data-pom="components/widgets/modal">
        <h2 id="welcome-modal-title">Welcome MEMBER</h2>
        <p><button type="button" id="welcome-modal-close">Close</button></p>
      </div>
    </div>
    <div id="toast-root" class="toast-root" aria-live="polite" data-pom="components/shell/toast"></div>
    <script src="/shared/mock-shell.js"></script>
    <script>
      (function () {
        const openBtn = document.getElementById("welcome-modal-open");
        const root = document.getElementById("welcome-modal-root");
        const closeBtn = document.getElementById("welcome-modal-close");
        const titleEl = document.getElementById("welcome-modal-title");
        if (!openBtn || !root || !closeBtn || !titleEl) return;
        openBtn.addEventListener("click", () => {
          const m = document.body.getAttribute("data-membership") || "MEMBER";
          titleEl.textContent = `Welcome ${m}`;
          root.hidden = false;
        });
        closeBtn.addEventListener("click", () => {
          root.hidden = true;
        });
        root.addEventListener("click", (e) => {
          if (e.target === root) root.hidden = true;
        });
      })();
    </script>
  </body>
</html>
